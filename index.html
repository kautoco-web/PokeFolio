/* ── SLOT CARD ── */
function SlotCard({ slot, index, onAdd, onRemove }) {
  const [hov, setHov] = useState(false);
  if (slot) {
    return (
      <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{ aspectRatio:"2/3", borderRadius:10, overflow:"hidden", position:"relative", cursor:"default",
          background:`linear-gradient(145deg,${slot.a},${slot.b})`,
          border:`1px solid ${hov?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.1)"}`,
          boxShadow: hov?`0 8px 24px #000,0 0 20px ${slot.acc||"#fff"}33`:`0 4px 12px #000`,
          transform: hov?"scale(1.04)":"scale(1)", transition:"all .2s",
          display:"flex", alignItems:"center", justifyContent:"center" }}>
        <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${slot.pid}.png`}
          alt="" style={{ width:"88%", imageRendering:"pixelated" }}/>
        {hov && (
          <div onClick={()=>onRemove(index)} style={{ position:"absolute", inset:0,
            background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center",
            cursor:"pointer" }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </div>
        )}
      </div>
    );
  }
  return (
    <div onClick={()=>onAdd(index)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ aspectRatio:"2/3", borderRadius:10, cursor:"pointer", transition:"all .2s",
        border: hov?`1px dashed ${RED}`:`1px dashed rgba(255,255,255,0.12)`,
        background: hov?`${RED}0a`:"rgba(255,255,255,0.02)",
        display:"flex", alignItems:"center", justifyContent:"center" }}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke={hov?RED:"rgba(255,255,255,0.25)"} strokeWidth="2" strokeLinecap="round" style={{transition:"stroke .2s"}}>
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </div>
  );
}

function DraggableCard({ p, c, cardData, onDragStart, onDragEnd }) {
  const [hov, setHov] = useState(false);
  return (
    <div draggable
      onDragStart={e=>{ e.dataTransfer.effectAllowed="copy"; onDragStart(); }}
      onDragEnd={onDragEnd}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ aspectRatio:"2/3", borderRadius:10, cursor:"grab",
        background:`linear-gradient(145deg,${c[0]},${c[1]})`,
        border:`1px solid ${hov?(c[2]||RED)+"88":"rgba(255,255,255,0.1)"}`,
        boxShadow: hov?`0 8px 20px #000,0 0 16px ${c[2]||RED}33`:"0 4px 10px #000",
        transform: hov?"scale(1.05)":"scale(1)", transition:"all .2s" }}/>
  );
}

function BinderView({ binder, onBack, onUpdate, onCardClick }) {
  const [activePage,  setActivePage]  = useState(0);
  const [showSearch,  setShowSearch]  = useState(false);
  const [query,       setQuery]       = useState("");
  const [results,     setResults]     = useState([]);
  const [loading,     setLoading]     = useState(false);
  const [dragCard,    setDragCard]    = useState(null);
  const [dragFromIdx, setDragFromIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);

  const SLOTS = 25;
  const pages = (binder.pages && binder.pages.length > 0) ? binder.pages : [Array(SLOTS).fill(null)];
  const currentPage = pages[activePage] || Array(SLOTS).fill(null);
  const slots = Array.from({length: SLOTS}, (_, i) => currentPage[i] || null);
  const allCards = pages.flatMap(p => (p || []).filter(Boolean));
  const filled = allCards.length;
  const totalVal = filled * 120;

  function addPage() {
    const np = [...pages, Array(SLOTS).fill(null)];
    onUpdate({ ...binder, pages: np });
    setActivePage(np.length - 1);
  }

  function dropOnSlot(idx) {
    if (!dragCard && dragFromIdx === null) return;
    if (slots[idx] && dragFromIdx === null) return;
    const ns = [...slots];
    if (dragFromIdx !== null) {
      const tmp = ns[idx];
      ns[idx] = ns[dragFromIdx];
      ns[dragFromIdx] = tmp;
    } else {
      ns[idx] = { pid: dragCard.id, a: dragCard.a, b: dragCard.b, acc: dragCard.acc, cardData: dragCard.cardData };
    }
    const np = pages.map((p, i) => i === activePage ? ns : p);
    onUpdate({ ...binder, pages: np, cards: np.flatMap(p=>(p||[]).filter(Boolean)).length });
    setDragCard(null); setDragFromIdx(null); setDragOverIdx(null);
  }

  function removeCard(i) {
    const ns = [...slots]; ns[i] = null;
    const np = pages.map((p, pi) => pi === activePage ? ns : p);
    onUpdate({ ...binder, pages: np, cards: np.flatMap(p=>(p||[]).filter(Boolean)).length });
  }

  async function doSearch(q) {
    if (!q.trim()) { setResults([]); return; }
    setLoading(true);
    const lower = q.toLowerCase();
    const hits = EXPLORE_CARDS.filter(c =>
      c.name.toLowerCase().includes(lower) ||
      c.set.toLowerCase().includes(lower) ||
      (c.rarity && c.rarity.toLowerCase().includes(lower))
    );
    setResults(hits);
    setLoading(false);
  }

  return (
    <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", background:BASE, overflow:"hidden" }}>

      {/* Header */}
      <div style={{ flexShrink:0, padding:"12px 20px", display:"flex", alignItems:"center", gap:14,
        borderBottom:`1px solid rgba(255,255,255,0.06)`, background:SHADOW }}>
        <div onClick={onBack}
          onMouseEnter={e=>{e.currentTarget.style.background=RED;e.currentTarget.style.borderColor=RED;}}
          onMouseLeave={e=>{e.currentTarget.style.background=RAISED;e.currentTarget.style.borderColor="rgba(255,255,255,0.15)";}}
          style={{ cursor:"pointer", display:"flex", alignItems:"center", gap:8, padding:"8px 16px",
            borderRadius:9, border:"1px solid rgba(255,255,255,0.15)", flexShrink:0, transition:"all .2s",
            background:RAISED, fontFamily:FF_STM, fontSize:11, color:WHITE, letterSpacing:1,
            boxShadow:"0 2px 8px rgba(0,0,0,0.4)" }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={WHITE} strokeWidth="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          TILLBAKA
        </div>
        <div style={{flex:1}}>
          <div style={{ fontFamily:FF_ORB, fontSize:16, fontWeight:900, color:WHITE }}>{binder.name}</div>
          <div style={{ fontFamily:FF_STM, fontSize:9, color:MUTED, letterSpacing:1, marginTop:1 }}>
            {filled} KORT · {pages.length} {pages.length===1?"SIDA":"SIDOR"}
          </div>
        </div>
        {/* Toggle analysis/search */}
        <div onClick={()=>setShowSearch(s=>!s)}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=RED;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=showSearch?RED:"rgba(255,255,255,0.08)";}}
          style={{ cursor:"pointer", padding:"6px 14px", borderRadius:8, flexShrink:0,
            border:`1px solid ${showSearch?RED:"rgba(255,255,255,0.08)"}`,
            background: showSearch?`${RED}18`:"transparent",
            fontFamily:FF_STM, fontSize:10, color:showSearch?RED:MUTED, letterSpacing:1, transition:"all .2s" }}>
          {showSearch ? "◀ ANALYS" : "SÖK KORT ▶"}
        </div>
      </div>

      {/* Body: 50/50 */}
      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>

        {/* LEFT: card grid */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", borderRight:`1px solid rgba(255,255,255,0.06)` }}>
          <div style={{ flex:1, overflowY:"auto", scrollbarWidth:"none", padding:"16px 20px" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
              {slots.map((s, i) => {
                const isOver = dragOverIdx === i;
                const isEmpty = !s;
                return (
                  <div key={i}
                    draggable={!!s}
                    onDragStart={e=>{ if(s){ e.dataTransfer.effectAllowed="move"; setDragFromIdx(i); setDragCard(null); } }}
                    onDragEnd={()=>{ setDragFromIdx(null); setDragOverIdx(null); }}
                    onDragOver={e=>{ if((isEmpty&&(dragCard||dragFromIdx!==null))||(s&&dragFromIdx!==null&&dragFromIdx!==i)){e.preventDefault();setDragOverIdx(i);} }}
                    onDragLeave={()=>setDragOverIdx(null)}
                    onDrop={()=>dropOnSlot(i)}
                    onMouseEnter={e=>{ if(isEmpty&&!dragCard&&dragFromIdx===null){ e.currentTarget.style.background="rgba(255,255,255,0.05)"; e.currentTarget.style.borderColor="rgba(255,255,255,0.28)"; e.currentTarget.style.transform="scale(1.04)"; } if(s&&!dragFromIdx){ e.currentTarget.style.transform="scale(1.05)"; e.currentTarget.style.boxShadow=`0 8px 24px #000,0 0 20px ${s.acc||RED}55`; e.currentTarget.style.borderColor=`${s.acc||RED}88`; } }}
                    onMouseLeave={e=>{ if(isEmpty&&!dragCard&&dragFromIdx===null){ e.currentTarget.style.background="rgba(255,255,255,0.02)"; e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"; e.currentTarget.style.transform="scale(1)"; } if(s){ e.currentTarget.style.transform="scale(1)"; e.currentTarget.style.boxShadow="0 4px 12px #000"; e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"; } }}
                    style={{ aspectRatio:"2/3", borderRadius:10, position:"relative", overflow:"hidden",
                      transition:"all .2s",
                      background: s ? `linear-gradient(145deg,${s.a},${s.b})` : isOver ? `${RED}18` : "rgba(255,255,255,0.02)",
                      border: s ? `1px solid ${isOver?"rgba(255,255,255,0.4)":"rgba(255,255,255,0.12)"}` : isOver ? `1px solid ${RED}` : `1px dashed rgba(255,255,255,0.12)`,
                      boxShadow: isOver ? `0 0 20px ${s?WHITE:RED}44` : s ? "0 4px 12px #000" : "none",
                      transform: isOver ? "scale(1.04)" : dragFromIdx===i ? "scale(0.95)" : "scale(1)",
                      opacity: dragFromIdx===i ? 0.4 : 1,
                      cursor: s ? "pointer" : isEmpty ? (dragCard||dragFromIdx!==null?"copy":"pointer") : "default",
                      display:"flex", alignItems:"center", justifyContent:"center" }}
                    onClick={()=>{
                      if(s && onCardClick) { const cd = s.cardData || {name:`Pokémon #${s.pid}`, a:s.a, b:s.b, acc:s.acc}; onCardClick(cd); }
                      else if(isEmpty&&dragFromIdx===null&&!dragCard){ setShowSearch(true); setQuery(""); setResults([]); }
                    }}>
                    {s
                      ? <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${s.pid}.png`}
                          alt="" style={{ width:"88%", imageRendering:"pixelated", pointerEvents:"none" }}/>
                      : isOver
                        ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={RED} strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>
                        : <svg viewBox="0 0 200 200" width="55%" height="55%" style={{opacity:0.12}}>
                            <circle cx="100" cy="100" r="90" fill="#0a0a0a" stroke="white" strokeWidth="12"/>
                            <path d="M10,100 A90,90 0 0,1 190,100 Z" fill="rgba(255,255,255,0.15)"/>
                            <rect x="10" y="92" width="180" height="16" fill="#0a0a0a"/>
                            <line x1="10" y1="92" x2="190" y2="92" stroke="white" strokeWidth="10"/>
                            <line x1="10" y1="108" x2="190" y2="108" stroke="white" strokeWidth="10"/>
                            <circle cx="100" cy="100" r="26" fill="#0a0a0a" stroke="white" strokeWidth="12"/>
                            <circle cx="100" cy="100" r="10" fill="white" opacity="0.4"/>
                          </svg>
                    }
                    {s && (
                      <div onClick={e=>{ e.stopPropagation(); removeCard(i); }}
                        style={{ position:"absolute", top:4, right:4, width:20, height:20, borderRadius:5,
                          background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center",
                          cursor:"pointer", transition:"background .15s",
                          boxShadow:"0 2px 6px #000" }}
                        onMouseEnter={e=>e.currentTarget.style.background=RED}
                        onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0.7)"}>
                        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round">
                          <path d="M18 6 6 18M6 6l12 12"/>
                        </svg>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Page nav */}
          <div style={{ flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            padding:"10px 20px", borderTop:`1px solid rgba(255,255,255,0.05)`, background:SHADOW }}>
            <div onClick={()=>setActivePage(p=>Math.max(0,p-1))}
              onMouseEnter={e=>{if(activePage>0)e.currentTarget.style.borderColor=`${RED}88`;}}
              onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.1)"}
              style={{ width:26, height:26, borderRadius:6, cursor:activePage>0?"pointer":"default",
                border:"1px solid rgba(255,255,255,0.1)", display:"flex", alignItems:"center", justifyContent:"center",
                opacity:activePage>0?1:0.25, transition:"all .2s" }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            {pages.map((_,i)=>(
              <div key={i} onClick={()=>setActivePage(i)}
                style={{ width:i===activePage?22:7, height:7, borderRadius:4, cursor:"pointer", transition:"all .3s",
                  background: i===activePage ? RED : "rgba(255,255,255,0.18)" }}/>
            ))}
            <div onClick={()=>setActivePage(p=>Math.min(pages.length-1,p+1))}
              onMouseEnter={e=>{if(activePage<pages.length-1)e.currentTarget.style.borderColor=`${RED}88`;}}
              onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.1)"}
              style={{ width:26, height:26, borderRadius:6, cursor:activePage<pages.length-1?"pointer":"default",
                border:"1px solid rgba(255,255,255,0.1)", display:"flex", alignItems:"center", justifyContent:"center",
                opacity:activePage<pages.length-1?1:0.25, transition:"all .2s" }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2.5"><path d="M9 18l6-6-6-6"/></svg>
            </div>
            <div onClick={addPage}
              onMouseEnter={e=>e.currentTarget.style.borderColor=RED}
              onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.15)"}
              style={{ width:26, height:26, borderRadius:6, cursor:"pointer", marginLeft:4,
                border:"1px dashed rgba(255,255,255,0.15)", display:"flex", alignItems:"center", justifyContent:"center",
                transition:"border-color .2s" }}>
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
            </div>
          </div>
        </div>

        {/* RIGHT: analysis OR search */}
        {showSearch ? (
          <div style={{ flex:1, display:"flex", flexDirection:"column", background:SHADOW, overflow:"hidden" }}>
            {/* Search bar */}
            <div style={{ flexShrink:0, padding:"16px 18px", borderBottom:`1px solid rgba(255,255,255,0.06)` }}>
            <div style={{ fontFamily:FF_STM, fontSize:9, color:MUTED, letterSpacing:2, marginBottom:10, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <span>SÖK &amp; DRA KORT</span>
              <div onClick={()=>setShowSearch(false)}
                onMouseEnter={e=>{e.currentTarget.style.background=RED;e.currentTarget.style.borderColor=RED;}}
                onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="rgba(255,255,255,0.15)";}}
                style={{ width:22, height:22, borderRadius:6, cursor:"pointer", border:"1px solid rgba(255,255,255,0.15)",
                  display:"flex", alignItems:"center", justifyContent:"center", transition:"all .2s" }}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2.5" strokeLinecap="round">
                  <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
              </div>
            </div>
              <div style={{ display:"flex", gap:8 }}>
                <div style={{ flex:1, background:BASE, borderRadius:9, padding:"10px 14px",
                  border:`1px solid rgba(255,255,255,0.1)`, display:"flex", alignItems:"center", gap:8 }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2.5" strokeLinecap="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                  </svg>
                  <input autoFocus value={query}
                    onChange={e=>{ setQuery(e.target.value); doSearch(e.target.value); }}
                    onKeyDown={e=>{ if(e.key==="Enter") doSearch(query); }}
                    placeholder="t.ex. Charizard, Pikachu..."
                    style={{ background:"none", border:"none", outline:"none", color:WHITE,
                      fontFamily:FF_RAJ, fontSize:14, width:"100%", caretColor:RED }}/>
                </div>
              </div>
              <div style={{ fontFamily:FF_STM, fontSize:9, color:MUTED, letterSpacing:1, marginTop:8, opacity:0.6 }}>
                DRA KORT TILL EN TOM PLATS ↙
              </div>
            </div>
            {/* Results grid */}
            <div style={{ flex:1, overflowY:"auto", scrollbarWidth:"none", padding:"14px 16px" }}>
              {loading && <div style={{ textAlign:"center", padding:32, fontFamily:FF_STM, fontSize:10, color:MUTED, letterSpacing:2 }}>SÖKER...</div>}
              {!query && <div style={{ textAlign:"center", padding:32, fontFamily:FF_STM, fontSize:10, color:MUTED, letterSpacing:1 }}>SKRIV FÖR ATT SÖKA</div>}
              {!loading && query && !results.length && <div style={{ textAlign:"center", padding:32, fontFamily:FF_STM, fontSize:10, color:MUTED }}>INGA RESULTAT</div>}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
                {results.map((c,i) => {
                  const col = TYPE_COLORS[(i+1) % TYPE_COLORS.length];
                  return (
                    <DraggableCard key={i} p={{id: i+1, name: c.name}} c={[c.a||col[0], c.b||col[1], c.acc||col[2]]}
                      cardData={c}
                      onDragStart={()=>setDragCard({id: i+1, name: c.name, a: c.a||col[0], b: c.b||col[1], acc: c.acc||col[2], cardData: c})}
                      onDragEnd={()=>setDragCard(null)}/>
                  );
                })}
              </div>
            </div>
          </div>
        ) : (
          <div style={{ flex:1, overflowY:"auto", scrollbarWidth:"none", background:SHADOW, display:"flex", flexDirection:"column" }}>
            <div style={{ padding:"22px 20px", borderBottom:`1px solid rgba(255,255,255,0.05)` }}>
              <div style={{ fontFamily:FF_STM, fontSize:9, color:MUTED, letterSpacing:2, marginBottom:8 }}>TOTALT VÄRDE</div>
              <div style={{ fontFamily:FF_ORB, fontSize:30, fontWeight:900, color:RED }}>{totalVal.toLocaleString("sv-SE")} kr</div>
              <div style={{ fontFamily:FF_STM, fontSize:9, color:GREEN, marginTop:5, letterSpacing:1 }}>▲ +3,2% DENNA VECKA</div>
            </div>
            <div style={{ padding:"18px 20px", borderBottom:`1px solid rgba(255,255,255,0.05)` }}>
              <div style={{ fontFamily:FF_STM, fontSize:9, color:MUTED, letterSpacing:2, marginBottom:14 }}>VÄRDEUTVECKLING</div>
              <div style={{ height:110 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={[
                    {m:"OKT",v:0},{m:"NOV",v:filled*20},{m:"DEC",v:filled*45},
                    {m:"JAN",v:filled*70},{m:"FEB",v:filled*95},{m:"MAR",v:filled*108},{m:"APR",v:totalVal}
                  ]} margin={{top:4,right:2,bottom:0,left:0}}>
                    <defs>
                      <linearGradient id="gBV" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor={RED} stopOpacity={0.4}/>
                        <stop offset="100%" stopColor={RED} stopOpacity={0}/>
                      </linearGradient>
                    </defs>
                    <XAxis dataKey="m" tick={{fontSize:9,fill:MUTED,fontFamily:"Share Tech Mono"}} axisLine={false} tickLine={false}/>
                    <Tooltip contentStyle={{background:"#111",border:`1px solid ${RED}44`,borderRadius:8,fontFamily:"Orbitron,monospace",fontSize:10}}
                      formatter={v=>[v+" kr","Värde"]} labelStyle={{color:MUTED}}/>
                    <Area type="monotone" dataKey="v" stroke={RED} strokeWidth={2} fill="url(#gBV)" dot={false}/>
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>
            <div style={{ padding:"18px 20px", borderBottom:`1px solid rgba(255,255,255,0.05)` }}>
              <div style={{ fontFamily:FF_STM, fontSize:9, color:MUTED, letterSpacing:2, marginBottom:12 }}>STATISTIK</div>
              {[
                {l:"Kort totalt",  v:filled},
                {l:"Sidor",        v:pages.length},
                {l:"Snitt / kort", v:filled?Math.round(totalVal/filled)+" kr":"—"},
                {l:"Mest värd",    v:filled?"Okänd":"—"},
              ].map(r=>(
                <div key={r.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"8px 0",borderBottom:`1px solid rgba(255,255,255,0.04)`}}>
                  <span style={{fontFamily:FF_RAJ,fontSize:13,color:MUTED}}>{r.l}</span>
                  <span style={{fontFamily:FF_ORB,fontSize:11,fontWeight:700,color:WHITE}}>{r.v}</span>
                </div>
              ))}
            </div>
            <div style={{ padding:"18px 20px", borderBottom:`1px solid rgba(255,255,255,0.05)` }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{fontFamily:FF_STM,fontSize:9,color:MUTED,letterSpacing:2}}>FYLLNADSGRAD</span>
                <span style={{fontFamily:FF_ORB,fontSize:9,color:WHITE}}>{filled}/{pages.length*SLOTS}</span>
              </div>
              <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:3,width:`${Math.round(filled/(pages.length*SLOTS)*100)||0}%`,
                  background:`linear-gradient(90deg,${RED},${PINK})`,transition:"width .4s"}}/>
              </div>
            </div>
            <div style={{ padding:"18px 20px", flex:1 }}>
              <div style={{fontFamily:FF_STM,fontSize:9,color:MUTED,letterSpacing:2,marginBottom:14}}>TOPPINNEHAV</div>
              {allCards.length===0
                ? <div style={{textAlign:"center",padding:"24px 0",fontFamily:FF_STM,fontSize:9,color:MUTED,letterSpacing:1}}>INGA KORT ÄNNU</div>
                : allCards.slice(0,6).map((s,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",
                    borderBottom:`1px solid rgba(255,255,255,0.04)`}}>
                    <div style={{fontFamily:FF_STM,fontSize:9,color:MUTED,width:14,textAlign:"center"}}>{i+1}</div>
                    <div style={{width:36,height:50,borderRadius:6,flexShrink:0,
                      background:`linear-gradient(145deg,${s.a},${s.b})`,
                      border:`1px solid rgba(255,255,255,0.1)`,
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <img src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${s.pid}.png`}
                        alt="" style={{width:"90%",imageRendering:"pixelated"}}/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:FF_STM,fontSize:8,color:MUTED,marginBottom:2}}>#{s.pid}</div>
                      <div style={{fontFamily:FF_ORB,fontSize:11,fontWeight:700,color:WHITE}}>120 kr</div>
                      <div style={{fontFamily:FF_STM,fontSize:8,color:GREEN}}>▲ +2,1%</div>
                    </div>
                    <div style={{width:40,height:3,borderRadius:2,background:`${s.acc||RED}55`,alignSelf:"center"}}>
                      <div style={{height:"100%",width:"70%",borderRadius:2,background:s.acc||RED}}/>
                    </div>
                  </div>
                ))
              }
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const DEFAULT_BINDERS = [
  { name:"Huvud-binder",        cards:0, val:"0 kr", updated:"Idag",        pages:[Array(25).fill(null)], a:"#7c2d12", b:"#3b0a00", acc:"#fb923c" },
  { name:"Graderade kort",      cards:0, val:"0 kr", updated:"3 dagar sen", pages:[Array(25).fill(null)], a:"#1a1a3e", b:"#0d0d22", acc:"#f59e0b" },
  { name:"Japanska sällsynter", cards:0, val:"0 kr", updated:"1 vecka sen", pages:[Array(25).fill(null)], a:"#064e3b", b:"#022c1f", acc:"#34d399" },
  { name:"Alt Art samling",     cards:0, val:"0 kr", updated:"2 v. sen",    pages:[Array(25).fill(null)], a:"#3b0764", b:"#1e0338", acc:"#c084fc" },
];

function PortfolioPage({user,onCardClick}) {
  const isMaster = user && MASTER_USERS.includes(user.email);
  const isAdmin  = user && ADMIN_USERNAMES.includes(user?.username?.toLowerCase());
  const canMaster = isMaster || isAdmin; // admins get master perks
  const [activeBinder, setActiveBinder] = useState(null);
  const [binders,      setBinders]      = useState(null);
  const [showCreate,   setShowCreate]   = useState(false);
  const [newName,      setNewName]      = useState("");
  const [newCover,     setNewCover]     = useState(0);
  const storageKey = user ? `pf-binders-v5-${user.email}` : "pf-binders-v5";

  useEffect(() => {
    async function load() {
      try {
        const res = await window.storage.get(storageKey);
        if (res && res.value) { setBinders(JSON.parse(res.value)); return; }
      } catch(_) {}
      setBinders(DEFAULT_BINDERS);
    }
    load();
  }, [storageKey]);

  useEffect(() => {
    if (binders === null) return;
    async function save() {
      try { await window.storage.set(storageKey, JSON.stringify(binders)); } catch(_) {}
    }
    save();
  }, [binders]);

  function createBinder() {
    if (!newName.trim()) return;
    if (!canMaster && binders.length >= FREE_LIMITS.binders) return;
    const cover = COVER_PRESETS[newCover];
    setBinders(prev => [...prev, { name:newName.trim(), cards:0, val:"0 kr", updated:"Precis nu", pages:[Array(25).fill(null)], a:cover.a, b:cover.b, acc:cover.acc }]);
    setShowCreate(false); setNewName(""); setNewCover(0);
  }

  function deleteBinder(i) {
    setBinders(prev => prev.filter((_,j) => j !== i));
    if (activeBinder === i) setActiveBinder(null);
  }

  function updateBinder(i, updated) {
    setBinders(prev => prev.map((b,j) => j===i ? updated : b));
  }

  if (binders === null) return (
    <div style={{ position:"absolute",inset:0,display:"flex", alignItems:"center", justifyContent:"center", background:BASE }}>
      <div style={{ fontFamily:"Share Tech Mono,monospace", fontSize:12, color:MUTED, letterSpacing:2 }}>LADDAR...</div>
    </div>
  );

  if (activeBinder !== null && binders[activeBinder]) return (
    <div style={{ position:"absolute",inset:0,background:BASE }}>
      <BinderView binder={binders[activeBinder]} onBack={()=>setActiveBinder(null)} onUpdate={u=>updateBinder(activeBinder,u)} onCardClick={onCardClick}/>
    </div>
  );

  return (
    <div style={{ position:"absolute",inset:0,background:BASE,overflowY:"auto",scrollbarWidth:"none",padding:"40px 48px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:36 }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:6 }}>
              <div style={{ fontFamily:"Orbitron,monospace", fontSize:24, fontWeight:900, color:WHITE, letterSpacing:-0.5 }}>Min portfolio</div>
              <div style={{ fontFamily:FF_STM, fontSize:9, letterSpacing:1, padding:"3px 9px", borderRadius:6,
                background: canMaster?`${RED}22`:"rgba(255,255,255,0.07)",
                color: canMaster?RED:MUTED, border:`1px solid ${canMaster?RED+"44":"rgba(255,255,255,0.1)"}`}}>
                {canMaster?"✦ MASTER":"GRATIS"}
              </div>
            </div>
            <div style={{ fontFamily:"Share Tech Mono,monospace", fontSize:11, color:MUTED, letterSpacing:1 }}>
              {binders.reduce((a,b)=>a+(b.cards||0),0)} KORT · {binders.length}/{canMaster?"∞":FREE_LIMITS.binders} BINDERS
            </div>
            {!canMaster && (
              <div style={{ fontFamily:FF_STM, fontSize:9, color:"#f59e0b", letterSpacing:1, marginTop:4 }}>
                {FREE_LIMITS.binders - binders.length} binders kvar · Uppgradera till Master för obegränsat
              </div>
            )}
          </div>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:20 }}>
          {binders.map((b,i) => (
            <div key={i} style={{ position:"relative" }}>
              <div onClick={()=>deleteBinder(i)} style={{ position:"absolute", top:-10, right:-10, zIndex:10,
                width:26, height:26, borderRadius:"50%", background:"#1a1a1a",
                border:`1px solid rgba(255,255,255,0.15)`, cursor:"pointer",
                display:"flex", alignItems:"center", justifyContent:"center", boxShadow:`0 2px 8px #000`, transition:"all .15s" }}
                onMouseEnter={e=>{ e.currentTarget.style.background=RED; e.currentTarget.style.borderColor=RED; }}
                onMouseLeave={e=>{ e.currentTarget.style.background="#1a1a1a"; e.currentTarget.style.borderColor="rgba(255,255,255,0.15)"; }}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round">
                  <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
              </div>
              <BinderCard b={b} onClick={()=>setActiveBinder(i)}/>
            </div>
          ))}
          {(!canMaster && binders.length >= FREE_LIMITS.binders) ? (
            <div style={{ borderRadius:18, border:`1.5px dashed ${RED}44`, background:`${RED}06`,
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              padding:40, gap:10, minHeight:200 }}>
              <div style={{ fontFamily:FF_ORB, fontSize:12, fontWeight:700, color:RED, letterSpacing:0.5, textAlign:"center" }}>BINDERGRÄNS NÅDD</div>
              <div style={{ fontFamily:FF_RAJ, fontSize:13, color:MUTED, textAlign:"center" }}>Uppgradera till Master för obegränsade binders</div>
              <div onClick={()=>{}} style={{ marginTop:6, padding:"8px 18px", borderRadius:9, background:RED,
                color:"#fff", fontFamily:FF_ORB, fontSize:11, fontWeight:700, cursor:"pointer",
                boxShadow:`0 0 16px ${RED}44` }}>UPPGRADERA →</div>
            </div>
          ) : (
          <div onClick={()=>setShowCreate(true)} style={{ borderRadius:18, cursor:"pointer",
            border:`1.5px dashed rgba(255,255,255,0.12)`, background:"transparent",
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            padding:40, gap:14, minHeight:200, transition:"all .25s" }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=`${RED}66`; e.currentTarget.style.background=`${RED}06`; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"; e.currentTarget.style.background="transparent"; }}>
            <div style={{ width:44, height:44, borderRadius:"50%", border:`1.5px solid rgba(255,255,255,0.15)`,
              display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <div style={{ fontFamily:"Orbitron,monospace", fontSize:13, fontWeight:700, color:MUTED, letterSpacing:0.5 }}>SKAPA NY BINDER</div>
          </div>
          )}
        </div>

      {showCreate && (
        <div style={{ position:"fixed", inset:0, zIndex:200, display:"flex", alignItems:"center", justifyContent:"center",
          background:"rgba(0,0,0,0.8)", backdropFilter:"blur(8px)" }}
          onClick={()=>{ setShowCreate(false); setNewName(""); setNewCover(0); }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#111", borderRadius:20, padding:"32px 36px",
            border:`1px solid rgba(255,255,255,0.1)`, boxShadow:`0 24px 80px #000`, width:440 }}>
            <div style={{ fontFamily:FF_ORB, fontSize:18, fontWeight:900, color:WHITE, marginBottom:6 }}>Ny binder</div>
            <div style={{ fontFamily:FF_STM, fontSize:10, color:MUTED, letterSpacing:1, marginBottom:24 }}>VÄLJ OMSLAG & NAMN</div>

            {/* Cover preview */}
            <div style={{ height:110, borderRadius:12, marginBottom:16, overflow:"hidden", position:"relative",
              background:`linear-gradient(145deg,${COVER_PRESETS[newCover].a},${COVER_PRESETS[newCover].b})`,
              border:`1px solid ${COVER_PRESETS[newCover].acc}44`, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg viewBox="0 0 200 200" width="80" height="80" style={{opacity:0.15}}>
                <path d="M10,100 A90,90 0 0,1 190,100 Z" fill={COVER_PRESETS[newCover].acc}/>
                <circle cx="100" cy="100" r="90" fill="none" stroke={COVER_PRESETS[newCover].acc} strokeWidth="8"/>
                <rect x="10" y="93" width="180" height="14" fill={COVER_PRESETS[newCover].acc}/>

              ))}
            </div>

            {/* Name input */}
            <div style={{ background:"#0a0a0a", borderRadius:10, padding:"12px 16px", border:`1px solid rgba(255,255,255,0.1)`, marginBottom:20 }}>
              <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)}

                style={{ background:"none", border:"none", outline:"none", color:WHITE,
                  fontFamily:FF_RAJ, fontSize:15, width:"100%", caretColor:RED }}/>

              <button onClick={createBinder} disabled={!newName.trim()}
                style={{ flex:1, padding:"11px 0", borderRadius:10, border:"none",
                  background:newName.trim()?RED:"#333", color:newName.trim()?"#fff":MUTED,

                  cursor:newName.trim()?"pointer":"default",
                  boxShadow:newName.trim()?`0 0 16px ${RED}44`:"none", transition:"all .2s" }}>SKAPA</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── AUTH MODAL ── */
function AuthModal({mode,onClose,onSuccess,onSwitch}){
  const [email,setEmail]=useState("");
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [err,setErr]=useState("");

  async function submit(){
    setErr("");
    if(!email||!password){setErr("Fyll i alla fält.");return;}
    if(mode==="signup"){
      if(!username){setErr("Ange ett användarnamn.");return;}
      const existing=await window.storage.get(`pf-user-${email}`).catch(()=>null);
      if(existing?.value){setErr("E-postadressen används redan.");return;}
      await window.storage.set(`pf-user-${email}`,JSON.stringify({email,username,password:btoa(password)}));
      const sess={email,username};
      await window.storage.set("pf-session",JSON.stringify(sess));
      onSuccess(sess);
    } else {
      let stored=null;
      try{const r=await window.storage.get(`pf-user-${email}`);if(r?.value)stored=JSON.parse(r.value);}catch(_){}
      if(!stored||stored.password!==btoa(password)){setErr("Fel e-post eller lösenord.");return;}
      const sess={email,username:stored.username};
      await window.storage.set("pf-session",JSON.stringify(sess));
      onSuccess(sess);
    }
  }

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",
      justifyContent:"center",background:"rgba(0,0,0,0.88)",backdropFilter:"blur(16px)"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#111",borderRadius:24,width:"min(420px,92vw)",
        padding:36,border:"1px solid rgba(255,255,255,0.1)",boxShadow:"0 40px 100px #000"}}>
        <div style={{fontFamily:FF_ORB,fontSize:20,fontWeight:900,color:WHITE,marginBottom:6}}>
          {mode==="signup"?"Skapa konto":"Logga in"}
        </div>
        <div style={{fontFamily:FF_RAJ,fontSize:14,color:MUTED,marginBottom:28}}>
          {mode==="signup"?"Välkommen till PokéFolio!":"Välkommen tillbaka!"}
        </div>
        {err&&<div style={{padding:"10px 14px",borderRadius:8,background:`${RED}18`,border:`1px solid ${RED}44`,
          fontFamily:FF_STM,fontSize:11,color:RED,marginBottom:16}}>{err}</div>}
        <FieldInput label="E-POST" value={email} onChange={setEmail} type="email" placeholder="din@email.se"/>
        {mode==="signup"&&<FieldInput label="ANVÄNDARNAMN" value={username} onChange={setUsername} placeholder="Ditt användarnamn"/>}
        <FieldInput label="LÖSENORD" value={password} onChange={setPassword} type="password" placeholder="Minst 6 tecken"/>
        <div onClick={submit} style={{width:"100%",padding:14,borderRadius:12,background:RED,textAlign:"center",
          cursor:"pointer",fontFamily:FF_ORB,fontSize:13,color:"#fff",fontWeight:700,marginTop:8,
          boxShadow:`0 0 24px ${RED}44`}}>
          {mode==="signup"?"SKAPA KONTO":"LOGGA IN"}
        </div>
        <div style={{textAlign:"center",marginTop:18,fontFamily:FF_RAJ,fontSize:13,color:MUTED}}>
          {mode==="signup"?"Har du redan ett konto? ":"Inget konto? "}
          <span onClick={()=>onSwitch(mode==="signup"?"login":"signup")}
            style={{color:RED,cursor:"pointer",fontWeight:600}}>
            {mode==="signup"?"Logga in":"Skapa konto"}
          </span>
        </div>
      </div>
    </div>
  );
}

function UtforskaPage({onCardClick,user,wishlist:externalWishlist,onToggleWish:externalToggle,onNeedAuth}){
  const [query,setQuery]=useState("");
  const [sort,setSort]=useState("Best Match");
  const [showSort,setShowSort]=useState(false);
  const [pf,setPf]=useState(null);
  const [internalWishlist, setInternalWishlist] = useState([]);
  const wishlist = externalWishlist || internalWishlist;
  const [selectedRarities, setSelectedRarities] = useState([]);
  const [selectedSets,     setSelectedSets]     = useState([]);
  const [priceMin,         setPriceMin]         = useState("");
  const [priceMax,         setPriceMax]         = useState("");

  // Derived filtered+sorted cards
  const displayCards = (() => {
    let result = [...EXPLORE_CARDS];

    // Text search
    const q = query.trim().toLowerCase();
    if (q) result = result.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.set.toLowerCase().includes(q) ||
      (c.rarity||"").toLowerCase().includes(q)
    );

    // Rarity filter
    if (selectedRarities.length > 0)
      result = result.filter(c => selectedRarities.includes(c.rarity));

    // Set filter
    if (selectedSets.length > 0)
      result = result.filter(c => selectedSets.includes(c.set));

    // Price filter
    const minVal = parseInt(priceMin.replace(/\D/g,""));
    const maxVal = parseInt(priceMax.replace(/\D/g,""));
    if (!isNaN(minVal)) result = result.filter(c => parseInt((c.val||"0").replace(/\D/g,"")) >= minVal);
    if (!isNaN(maxVal)) result = result.filter(c => parseInt((c.val||"0").replace(/\D/g,"")) <= maxVal);

    // Portfolio filter
    if (pf === "owned")    result = result.filter(c => wishlist.includes(c.name));
    if (pf === "notowned") result = result.filter(c => !wishlist.includes(c.name));

    // Sort
    if (sort === "Pris: Lägst") result.sort((a,b) => parseInt((a.val||"0").replace(/\D/g,"")) - parseInt((b.val||"0").replace(/\D/g,"")));
    if (sort === "Pris: Högst") result.sort((a,b) => parseInt((b.val||"0").replace(/\D/g,"")) - parseInt((a.val||"0").replace(/\D/g,"")));
    if (sort === "Nyast")       result.sort((a,b) => (b.id||0)-(a.id||0));

    return result;
  })();

  function toggleRarity(r){ setSelectedRarities(prev => prev.includes(r) ? prev.filter(x=>x!==r) : [...prev,r]); }
  function toggleSet(s)    { setSelectedSets(prev => prev.includes(s) ? prev.filter(x=>x!==s) : [...prev,s]); }

  function doRensa(){
    setQuery(""); setSort("Best Match"); setProdType(null); setPf(null);
    setSelectedRarities([]); setSelectedSets([]); setPriceMin(""); setPriceMax("");
  }
  const [binders,setBinders]=useState([]);
  const [viewMode,setViewMode]=useState("grid");
  const sortOpts=["Best Match","Pris: Lägst","Pris: Högst","Nyast"];

  useEffect(()=>{
    async function load(){
      if(!user){setBinders([]);setInternalWishlist([]);return;}
      try{const r=await window.storage.get(`pf-binders-v5-${user.email}`);if(r?.value)setBinders(JSON.parse(r.value));}catch(_){}
      if(!externalWishlist){
        try{const r=await window.storage.get(`pf-wishlist-${user.email}`);if(r?.value)setInternalWishlist(JSON.parse(r.value));}catch(_){}
      }
    }
    load();
  },[user?.email]);

  function addToBinder(binderIdx,card){
    setBinders(prev=>{
      const updated=prev.map((b,i)=>{
        if(i!==binderIdx)return b;
        const pages=b.pages||[b.slots||Array(12).fill(null)];
        let tp=-1,ts=-1;
        for(let p=0;p<pages.length;p++){const idx=pages[p].findIndex(s=>!s);if(idx!==-1){tp=p;ts=idx;break;}}
        let np=pages.map(p=>[...p]);
        if(tp===-1){np.push(Array(12).fill(null));tp=np.length-1;ts=0;}
        const colors=[["#7c2d12","#3b0a00","#fb923c"],["#1a1a3e","#0d0d22","#f59e0b"],["#064e3b","#022c1f","#34d399"]];
        const col=colors[Math.floor(Math.random()*colors.length)];
        np[tp][ts]={pid:1,name:card.name,set:card.set,a:card.a||col[0],b:card.b||col[1],acc:card.acc||col[2]};
        return{...b,pages:np,cards:np.flat().filter(Boolean).length};
      });
      if(user)window.storage.set(`pf-binders-v5-${user.email}`,JSON.stringify(updated)).catch(()=>{});
      return updated;
    });
  }

  async function toggleWish(name){
    if(externalToggle){ externalToggle(name); return; }
    if(!user)return;
    const next=internalWishlist.includes(name)?internalWishlist.filter(n=>n!==name):[...internalWishlist,name];
    setInternalWishlist(next);
    await window.storage.set(`pf-wishlist-${user.email}`,JSON.stringify(next));
  }

  function doSearch(){ /* search is live via displayCards */ }

  return(
    <div style={{position:"absolute",inset:0,background:BASE,overflowY:"auto",scrollbarWidth:"none"}}>
      <div style={{padding:"24px 48px 12px"}}>
        <div style={{fontFamily:FF_ORB,fontSize:20,fontWeight:900,color:WHITE,marginBottom:12,letterSpacing:-0.3}}>Hitta ett kort</div>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:12,background:SHADOW,
            borderRadius:10,padding:"11px 18px",border:"1px solid rgba(255,255,255,0.08)",
            boxShadow:`inset 3px 3px 8px #000,inset -3px -3px 8px ${RAISED}`}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2.5" strokeLinecap="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")doSearch();}}
              placeholder="Sök kort, set, sällsynthet..."
              style={{background:"none",border:"none",outline:"none",color:WHITE,fontFamily:FF_RAJ,fontSize:15,fontWeight:500,width:"100%",caretColor:RED}}/>
          </div>
          <button onClick={doSearch} style={{background:RED,color:"#fff",border:"none",borderRadius:10,padding:"0 24px",
            fontFamily:FF_ORB,fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:`0 0 14px ${RED}44`}}>Sök</button>
          <button onClick={doRensa} style={{background:SHADOW,color:MUTED,border:"1px solid rgba(255,255,255,0.08)",
            borderRadius:10,padding:"0 18px",fontFamily:FF_ORB,fontSize:13,fontWeight:700,
            cursor:"pointer",boxShadow:`3px 3px 8px #000,-3px -3px 8px ${RAISED}`}}>Rensa</button>
        </div>
      </div>

      <div style={{padding:"8px 48px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
        <div style={{fontFamily:FF_STM,fontSize:10,color:MUTED,letterSpacing:1}}>
          {displayCards.length} KORT
          {(selectedRarities.length+selectedSets.length+(priceMin?1:0)+(priceMax?1:0))>0&&
            <span style={{color:RED,marginLeft:8}}>
              · {selectedRarities.length+selectedSets.length+(priceMin?1:0)+(priceMax?1:0)} FILTER AKTIVA
            </span>}
        </div>
        <div style={{position:"relative"}}>
          <div onClick={()=>setShowSort(!showSort)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",
            background:SHADOW,borderRadius:8,padding:"7px 14px",border:"1px solid rgba(255,255,255,0.08)",
            boxShadow:`3px 3px 8px #000,-3px -3px 8px ${RAISED}`}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2"><path d="M3 6h18M6 12h12M9 18h6"/></svg>
            <span style={{fontFamily:FF_RAJ,fontSize:13,color:TEXT,fontWeight:600}}>Sortera: </span>
            <span style={{fontFamily:FF_RAJ,fontSize:13,color:WHITE,fontWeight:700}}>{sort}</span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={MUTED} strokeWidth="2.5"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          {showSort&&(
            <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:SHADOW,
              border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,overflow:"hidden",zIndex:50,
              boxShadow:"8px 8px 24px #000",minWidth:180}}>
              {sortOpts.map((o,i)=>(
                <div key={i} onClick={()=>{setSort(o);setShowSort(false);}} style={{
                  padding:"10px 16px",fontFamily:FF_RAJ,fontSize:13,fontWeight:600,
                  color:sort===o?WHITE:MUTED,background:sort===o?`${RED}18`:"transparent",
                  cursor:"pointer",borderLeft:sort===o?`2px solid ${RED}`:"2px solid transparent",transition:"all .15s"}}>

                </div>
              ))}

        </div>
        <div style={{display:"flex",gap:4}}>
          {["grid","list"].map(mode=>(
            <div key={mode} onClick={()=>setViewMode(mode)} style={{background:viewMode===mode?RED:SHADOW,
              borderRadius:8,padding:"7px 10px",border:`1px solid ${viewMode===mode?RED:"rgba(255,255,255,0.08)"}`,
              boxShadow:`3px 3px 8px #000,-3px -3px 8px ${RAISED}`,cursor:"pointer",transition:"all .2s"}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={viewMode===mode?WHITE:MUTED} strokeWidth="2" strokeLinecap="round">
                {mode==="grid"
                  ? <g><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></g>
                  : <g><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></g>
                }

      <div style={{display:"flex",padding:"16px 16px 32px 20px",gap:16,alignItems:"flex-start"}}>

            <RadioOpt label="Äger"   selected={pf==="owned"}    onSelect={()=>setPf(pf==="owned"?null:"owned")}/>
            <RadioOpt label="Äger ej" selected={pf==="notowned"} onSelect={()=>setPf(pf==="notowned"?null:"notowned")}/>
          </FSec>
          <FSec title="Prisintervall">
            <div style={{display:"flex",alignItems:"center",gap:8}}>

              ))}
            </div>
          </FSec>
          <FSec title="Sällsynthet">
            {["Common","Uncommon","Rare","Holo Rare","Alt Art","Special Illustration Rare","Rainbow Rare"].map(r=>(

                </div>
                <span style={{fontFamily:FF_RAJ,fontSize:14,color:TEXT,fontWeight:500}}>{r}</span>
              </div>
            ))}
          </FSec>
          <FSec title="Serie / Set">
            {[
              "Scarlet & Violet 151","Scarlet & Violet Base","Paldea Evolved","Obsidian Flames",
              "Paradox Rift","Paldean Fates","Temporal Forces","Twilight Masquerade",
              "Stellar Crown","Surging Sparks","Prismatic Evolutions",
              "Crown Zenith","Silver Tempest","Lost Origin","Astral Radiance",
              "Evolving Skies","Chilling Reign","Battle Styles","Shining Fates",
              "Vivid Voltage","Champion's Path","Darkness Ablaze","Rebel Clash",
              "Sword & Shield Base","Hidden Fates","Unified Minds","Unbroken Bonds",
              "Team Up","Lost Thunder","Dragon Majesty","Celestial Storm",
              "Forbidden Light","Ultra Prism","Burning Shadows","Guardians Rising",
              "Sun & Moon Base","Evolutions","Steam Siege","Fates Collide",
              "Generations","BREAKpoint","BREAKthrough","Ancient Origins",
              "Roaring Skies","Double Crisis","Primal Clash","Phantom Forces",
              "Furious Fists","Flashfire","XY Base","Legendary Treasures",
              "Boundaries Crossed","Dragons Exalted","Dark Explorers","Next Destinies",
              "Noble Victories","Emerging Powers","Black & White Base",
            ].map(s=>(
              <div key={s} onClick={()=>toggleSet(s)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:10}}>
                <div style={{width:16,height:16,borderRadius:4,flexShrink:0,transition:"all .15s",
                  border:`1.5px solid ${selectedSets.includes(s)?RED:MUTED+"66"}`,
                  background:selectedSets.includes(s)?RED:"transparent",
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {selectedSets.includes(s)&&<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>}
                </div>
                <span style={{fontFamily:FF_RAJ,fontSize:13,color:TEXT,fontWeight:500,lineHeight:1.3}}>{s}</span>
              </div>
            ))}
          </FSec>
        </div>

        <div id="utforska-scroll" style={{flex:1,padding:"4px 8px 20px 8px"}}>
          {displayCards.length===0?(
            <div style={{textAlign:"center",padding:"80px 0",fontFamily:FF_STM,fontSize:12,color:MUTED,letterSpacing:1}}>
              INGA KORT HITTADES
            </div>
          ):viewMode==="grid"?(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14}}>
              {displayCards.map((c,i)=>(
                <ExploreCard key={i} c={c} binders={binders} wishlist={wishlist} user={user}
                  onAddToBinder={addToBinder} onToggleWish={toggleWish} onCardClick={onCardClick} onNeedAuth={onNeedAuth}/>
              ))}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {displayCards.map((c,i)=>(
                <div key={i} onClick={()=>onCardClick&&onCardClick(c)}
                  style={{display:"flex",alignItems:"center",gap:16,padding:"14px 18px",borderRadius:14,
                    background:SHADOW,border:"1px solid rgba(255,255,255,0.07)",cursor:"pointer",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=`${c.acc}55`;e.currentTarget.style.background=RAISED;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.07)";e.currentTarget.style.background=SHADOW;}}>
                  <div style={{width:44,height:60,borderRadius:8,background:`linear-gradient(145deg,${c.a},${c.b})`,
                    flexShrink:0,border:`1px solid ${c.acc}44`}}/>

                    <div style={{fontFamily:FF_ORB,fontSize:13,fontWeight:700,color:WHITE,marginBottom:3}}>{c.name}</div>

                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>

                      <span style={{color:c.up?GREEN:PINK}}>{c.up?"▲":"▼"} </span>{c.val}

                    <div style={{fontFamily:FF_RAJ,fontSize:11,color:c.up?GREEN:PINK,marginTop:2}}>{c.chg}</div>

              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  const baseVal = parseInt((card.val||"0").replace(/[\s,]/g,""))||500;

  const TIME_RANGES = [
    {label:"1M",  months:1,  masterOnly:false},
    {label:"3M",  months:3,  masterOnly:true},
    {label:"6M",  months:6,  masterOnly:true},
    {label:"1Å",  months:12, masterOnly:true},
    {label:"ALL", months:36, masterOnly:true},
  ];
  const activeRange = TIME_RANGES.find(r=>r.label===timeRange)||TIME_RANGES[0];

  const MONTHS_LABELS = ["JAN","FEB","MAR","APR","MAJ","JUN","JUL","AUG","SEP","OKT","NOV","DEC"];
  function makeHist(mult) {
    const n = activeRange.months;
    return Array.from({length:Math.min(n,12)+1},(_,i)=>({
      m: n<=12 ? MONTHS_LABELS[(12-n+i)%12] : `M${i+1}`,
      v: Math.round(baseVal*mult*(0.45+(i/(n))*0.55+(Math.sin(i*1.1+mult)*0.06)))
    }));

                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.v}</span>

              ))}
            </div>

            <div style={{width:"100%",padding:"10px",borderRadius:10,background:"rgba(255,255,255,0.03)",

          </div>

            <div>
              <div style={{fontFamily:FF_STM,fontSize:9,color:MUTED,letterSpacing:2,marginBottom:8}}>VÄLJ GRAD</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {GRADES.map(g=>(

                      background:activeGradeTab===g.label?g.color+"22":"rgba(255,255,255,0.04)",
                      border:`1px solid ${activeGradeTab===g.label?g.color:"rgba(255,255,255,0.08)"}`,

                ))}
              </div>

              </div>
            </div>

            <div style={{background:"#0a0a0a",borderRadius:14,padding:"14px 16px",border:`1px solid ${activeGrade.color}22`}}>

                    return(
                      <div key={r.label} onClick={()=>{ if(!locked) setTimeRange(r.label); }}

                          background:active?activeGrade.color+"33":"rgba(255,255,255,0.05)",
                          color:active?activeGrade.color:locked?"rgba(255,255,255,0.2)":MUTED,
                          border:`1px solid ${active?activeGrade.color+"66":locked?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.1)"}`,

                          position:"relative" }}>
                        {r.label}

            </div>

                          </AreaChart>
                        </ResponsiveContainer>
                      </div>
                    </div>

                })}
              </div>
            </div>

            <div>
              <div style={{fontFamily:FF_STM,fontSize:9,color:MUTED,letterSpacing:2,marginBottom:8}}>PRISJÄMFÖRELSE</div>

        </div>
      </div>
    </div>

  useEffect(()=>{
    fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${set.id}&orderBy=number&pageSize=250`, {headers: PTCG_HEADERS})
      .then(r=>r.json())
      .then(d=>{ setCards(d.data||[]); setLoading(false); })
      .catch(()=>setLoading(false));

  const display = query

function App(){
  const [page,setPage]=useState("home");
  const [selectedCard,setSelectedCard]=useState(null);
  const [user,setUser]=useState(null);
  const [authPage,setAuthPage]=useState(null);
  const [poppedHeroCard,setPoppedHeroCard]=useState(null);
  const [wishlist,setWishlist]=useState([]);

  async function toggleWish(name){
    if(!user)return;
    const next=wishlist.includes(name)?wishlist.filter(n=>n!==name):[...wishlist,name];
    setWishlist(next);
    try{await window.storage.set(`pf-wishlist-${user.email}`,JSON.stringify(next));}catch(_){}
  }

  useEffect(()=>{
    if(!user){setWishlist([]);return;}
    window.storage.get(`pf-wishlist-${user.email}`).then(r=>{if(r?.value)setWishlist(JSON.parse(r.value));}).catch(()=>{});
  },[user]);

  useEffect(()=>{
    async function loadUser(){
      try{const res=await window.storage.get("pf-session");if(res?.value)setUser(JSON.parse(res.value));}catch(_){}
    }
    loadUser();
  },[]);

  function logout(){setUser(null);window.storage.delete("pf-session").catch(()=>{});setPage("home");}

  return(
    <div style={{fontFamily:FF_RAJ,background:BASE,color:TEXT,height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column",paddingTop:60}}>

                <div style={{background:"#1a1a1a",padding:"9px 16px",display:"flex",alignItems:"center",gap:7,borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                  {["#ff5f57","#ffbd2e","#28c840"].map(c=><div key={c} style={{width:10,height:10,borderRadius:"50%",background:c}}/>)}
                  <div style={{flex:1,background:"#111",borderRadius:6,padding:"4px 12px",marginLeft:8,fontFamily:FF_STM,fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:1}}>pokefolio.app/binder</div>
                </div>
                {/* App mockup */}
                <div style={{display:"flex",height:460,background:BASE}}>
                  {/* Left: 5x5 grid */}
                  <div style={{flex:1,padding:"14px",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,alignContent:"start",borderRight:"1px solid rgba(255,255,255,0.06)"}}>
                    {[
                      ["#7c2d12","#3b0a00","#fb923c"],["#1a1a3e","#0d0d22","#f59e0b"],["#064e3b","#022c1f","#34d399"],
                      ["#3b0764","#1e0338","#c084fc"],["#4c0519","#2d0010","#fb7185"],
                      ["#1e3a5f","#0f2235","#93c5fd"],["#422006","#1c0e02","#f97316"],
                      null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null
                    ].map((c,i)=>(
                      <div key={i} style={{aspectRatio:"2/3",borderRadius:7,
                        background:c?`linear-gradient(145deg,${c[0]},${c[1]})`:"rgba(255,255,255,0.02)",
                        border:c?`1px solid ${c[2]}44`:"1px dashed rgba(255,255,255,0.08)"}}>
                      </div>
                    ))}
                  </div>
                  {/* Right: analysis */}
                  <div style={{width:250,background:SHADOW,display:"flex",flexDirection:"column",fontSize:0}}>
                    <div style={{padding:"14px 14px 10px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <div style={{fontFamily:FF_STM,fontSize:7,color:MUTED,letterSpacing:2,marginBottom:5}}>TOTALT VÄRDE</div>
                      <div style={{fontFamily:FF_ORB,fontSize:22,fontWeight:900,color:RED}}>12 440 kr</div>
                      <div style={{fontFamily:FF_STM,fontSize:7,color:GREEN,marginTop:3}}>▲ +3,2% DENNA VECKA</div>
                    </div>
                    {/* Fake graph */}
                    <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <div style={{fontFamily:FF_STM,fontSize:7,color:MUTED,letterSpacing:2,marginBottom:8}}>VÄRDEUTVECKLING</div>
                      <svg viewBox="0 0 220 60" style={{width:"100%",height:60}}>
                        <defs>
                          <linearGradient id="pGrd" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={RED} stopOpacity="0.4"/>
                            <stop offset="100%" stopColor={RED} stopOpacity="0"/>
                          </linearGradient>
                        </defs>
                        <path d="M0,55 Q30,50 55,40 T100,25 T155,12 T220,5" fill="none" stroke={RED} strokeWidth="2"/>
                        <path d="M0,55 Q30,50 55,40 T100,25 T155,12 T220,5 L220,60 L0,60 Z" fill="url(#pGrd)"/>
                      </svg>
                    </div>
                    {/* Stats */}
                    <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      {[{l:"Kort totalt",v:"7"},{l:"Sidor",v:"1"},{l:"Snitt/kort",v:"1 777 kr"}].map(r=>(
                        <div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                          <span style={{fontFamily:FF_RAJ,fontSize:11,color:MUTED}}>{r.l}</span>
                          <span style={{fontFamily:FF_ORB,fontSize:9,fontWeight:700,color:WHITE}}>{r.v}</span>
                        </div>
                      ))}
                    </div>
                    {/* Top cards */}
                    <div style={{padding:"10px 14px"}}>
                      <div style={{fontFamily:FF_STM,fontSize:7,color:MUTED,letterSpacing:2,marginBottom:8}}>TOPPINNEHAV</div>
                      {[["#7c2d12","#3b0a00","#fb923c","3 200 kr"],["#1a1a3e","#0d0d22","#f59e0b","2 800 kr"],["#064e3b","#022c1f","#34d399","1 900 kr"]].map(([a,b,acc,val],i)=>(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                          <span style={{fontFamily:FF_STM,fontSize:8,color:MUTED,width:10}}>{i+1}</span>
                          <div style={{width:22,height:30,borderRadius:4,background:`linear-gradient(145deg,${a},${b})`,border:`1px solid ${acc}44`,flexShrink:0}}/>
                          <div>
                            <div style={{fontFamily:FF_ORB,fontSize:9,fontWeight:700,color:WHITE}}>{val}</div>
                            <div style={{fontFamily:FF_STM,fontSize:7,color:GREEN}}>▲ +2,1%</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* PRICING */}
            <section style={{height:"100vh",display:"flex",alignItems:"center",
              scrollSnapAlign:"start",scrollSnapStop:"always",overflow:"hidden",
              background:SHADOW,padding:"0 52px"}}>
              <div style={{maxWidth:1200,margin:"0 auto",width:"100%"}}>
                <div style={{fontFamily:FF_ORB,fontSize:32,fontWeight:700,color:WHITE,letterSpacing:-0.5,marginBottom:8,textAlign:"center"}}>
                  MEDLEMSKAP
                </div>
                <p style={{fontFamily:FF_RAJ,fontSize:16,color:MUTED,marginBottom:36,textAlign:"center"}}>Välj den plan som passar dig</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,maxWidth:680,margin:"0 auto"}}>

                  {/* GRATIS */}
                  <div style={{background:BASE,borderRadius:16,padding:28,position:"relative",overflow:"hidden",
                    boxShadow:`6px 6px 16px #000,-4px -4px 12px ${RAISED}99`,
                    border:`1px solid rgba(255,255,255,0.08)`}}>
                    <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent)`}}/>
                    <div style={{fontFamily:FF_STM,fontSize:11,color:MUTED,letterSpacing:2,marginBottom:14}}>GRATIS</div>
                    <div style={{fontFamily:FF_ORB,fontSize:38,fontWeight:900,color:WHITE,marginBottom:2}}>0 kr</div>
                    <div style={{fontFamily:FF_RAJ,fontSize:14,color:MUTED,marginBottom:24}}>för alltid</div>
                    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>
                      {[
                        {t:"1 binder",              ok:true},
                        {t:"Max 50 kort",           ok:true},
                        {t:"Pokémon-databas",       ok:true},
                        {t:"Community-åtkomst",    ok:true},
                        {t:"Live-priser",          ok:false},
                        {t:"Värdegraf & historik", ok:false},
                        {t:"Gradanalys (PSA/BGS)", ok:false},
                      ].map(f=>(
                        <div key={f.t} style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:16,height:16,borderRadius:"50%",flexShrink:0,
                            background:f.ok?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)",
                            display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke={f.ok?MUTED:"rgba(255,255,255,0.2)"} strokeWidth="3">
                              {f.ok?<path d="M20 6 9 17l-5-5"/>:<path d="M18 6 6 18M6 6l12 12"/>}
                            </svg>
                          </div>
                          <span style={{fontFamily:FF_RAJ,fontSize:15,color:f.ok?MUTED:"rgba(255,255,255,0.25)",textDecoration:f.ok?"none":"line-through"}}>{f.t}</span>
                        </div>
                      ))}
                    </div>
                    <CyberBtn color={MUTED} onClick={()=>user?setPage("portfolio"):setAuthPage("signup")}>Kom igång gratis</CyberBtn>
                  </div>

                  {/* MASTER */}
                  <div style={{background:`linear-gradient(145deg,#1a0a0a,#0d0505)`,borderRadius:16,padding:28,position:"relative",overflow:"hidden",
                    boxShadow:`6px 6px 16px #000,-4px -4px 12px ${RAISED}99,0 0 40px ${RED}18`,
                    border:`1px solid ${RED}44`}}>
                    <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${RED}99,transparent)`}}/>
                    <div style={{position:"absolute",top:14,right:14,background:RED,borderRadius:6,padding:"2px 8px",
                      fontFamily:FF_STM,fontSize:9,color:"#fff",letterSpacing:1}}>POPULÄR</div>
                    <div style={{fontFamily:FF_STM,fontSize:11,color:RED,letterSpacing:2,marginBottom:14}}>MASTER</div>
                    <div style={{fontFamily:FF_ORB,fontSize:38,fontWeight:900,color:WHITE,marginBottom:2}}>50 kr</div>
                    <div style={{fontFamily:FF_RAJ,fontSize:14,color:MUTED,marginBottom:24}}>per månad</div>
                    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>
                      {[
                        "Obegränsade binders",
                        "Obegränsat antal kort",
                        "Live-priser från Cardmarket",
                        "Värdegraf & prishistorik",
                        "Gradanalys (PSA / BGS / CGC)",
                      ].map(f=>(
                        <div key={f} style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:16,height:16,borderRadius:"50%",background:`${RED}22`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke={RED} strokeWidth="3"><path d="M20 6 9 17l-5-5"/></svg>
                          </div>
                          <span style={{fontFamily:FF_RAJ,fontSize:15,color:WHITE}}>{f}</span>
                        </div>
                      ))}
                    </div>
                    <CyberBtn lg onClick={()=>setAuthPage("signup")}>Bli Master</CyberBtn>
                  </div>

                </div>
              </div>
            </section>

            {/* FOOTER */}
            <footer style={{scrollSnapAlign:"start",background:SHADOW,borderTop:`1px solid ${RED}15`,padding:"40px 52px 28px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
                <div>
                  <div style={{fontFamily:FF_ORB,fontSize:20,fontWeight:900,letterSpacing:2,color:WHITE,marginBottom:10}}>
                    POKÉ<span style={{color:RED}}>FOLIO</span>
                  </div>
                  <p style={{fontSize:16,color:MUTED,lineHeight:1.75,maxWidth:240}}>Spåra din Pokémon-samling.</p>
                </div>
                {[
                  {t:"Sidor", links:[
                    {l:"Utforska", p:"utforska"},
                    {l:"Portfolio", p:"portfolio"},
                    {l:"Community", p:"community"},
                  ]},
                  {t:"Support", links:[
                    {l:"Community", p:"community"},
                    {l:"Discord", p:null, href:"https://discord.gg/pokefolio"},
                  ]},
                ].map((col,i)=>(
                  <div key={i}>
                    <div style={{fontFamily:FF_STM,fontSize:13,color:MUTED,letterSpacing:2,marginBottom:16}}>{col.t.toUpperCase()}</div>
                    {col.links.map(item=>(
                      item.href
                        ? <a key={item.l} href={item.href} target="_blank" rel="noreferrer"
                            style={{fontFamily:FF_RAJ,fontSize:16,color:WHITE,marginBottom:10,
                              cursor:"pointer",display:"block",textDecoration:"none",transition:"color .15s"}}
                            onMouseEnter={e=>e.currentTarget.style.color=RED}
                            onMouseLeave={e=>e.currentTarget.style.color=WHITE}>
                            {item.l}
                          </a>
                        : <div key={item.l} onClick={()=>item.p&&setPage(item.p)}
                            style={{fontFamily:FF_RAJ,fontSize:16,color:item.p?WHITE:MUTED,marginBottom:10,
                              cursor:item.p?"pointer":"default",transition:"color .15s"}}
                            onMouseEnter={e=>{ if(item.p) e.currentTarget.style.color=RED; }}
                            onMouseLeave={e=>{ if(item.p) e.currentTarget.style.color=WHITE; }}>
                            {item.l}
                          </div>
                    ))}
                  </div>
                ))}
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:20}}>
                <span style={{fontFamily:FF_STM,fontSize:13,color:MUTED,letterSpacing:1}}>© 2026 POKÉFOLIO</span>
              </div>
            </footer>
          </div>
        )}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
